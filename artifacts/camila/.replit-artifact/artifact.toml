kind = "web"
previewPath = "/"
title = "Camila — SaaS para emprendedores"
version = "1.0.0"
id = "artifacts/camila"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25785

[services.development]
run = "pnpm --filter @workspace/camila run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/camila", "run", "build" ]
publicDir = "artifacts/camila/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25785"
BASE_PATH = "/"
