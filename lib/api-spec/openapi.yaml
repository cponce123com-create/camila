      properties:
        byBusinessType:
          type: array
          items:
            $ref: '#/components/schemas/AdminAnalyticsBusinessItem'
        byDistrict:
          type: array
          items:
            $ref: '#/components/schemas/AdminAnalyticsDistrictItem'
        licenseStatus:
          type: array
          items:
            $ref: '#/components/schemas/AdminAnalyticsCountItem'
        licensePlan:
          type: array
          items:
            $ref: '#/components/schemas/AdminAnalyticsPlanItem'
        monthlyGrowth:
          type: array
          items:
            $ref: '#/components/schemas/AdminAnalyticsGrowthItem'
        newStores30days:
          type: integer
        totalSalesAmount:
          type: number
        totalSalesCount:
          type: integer
        topStores:
          type: array
          items:
            $ref: '#/components/schemas/AdminAnalyticsTopStoreItem'
      required: [byBusinessType, byDistrict, licenseStatus, licensePlan, monthlyGrowth, newStores30days, totalSalesAmount, totalSalesCount, topStores]

    ClientListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Client'
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer
        totalPages:
          type: integer
      required:
        - data
        - total
        - page
        - limit
        - totalPages
