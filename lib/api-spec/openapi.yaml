openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Camila SaaS - API para emprendedores locales
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: stores
    description: Store/tenant management
  - name: admin
    description: Superadmin operations
  - name: users
    description: User management
  - name: products
    description: Product catalog
  - name: categories
    description: Product categories
  - name: inventory
    description: Inventory management
  - name: customization
    description: Store customization and branding
  - name: product-images
    description: Product image management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: registerStore
      tags: [auth]
      summary: Register a new store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterStoreRequest"
      responses:
        "201":
          description: Store created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Store already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logoutUser
      tags: [auth]
      summary: Logout user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current user info
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Reset email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stores/me:
    get:
      operationId: getMyStore
      tags: [stores]
      summary: Get current store details
      responses:
        "200":
          description: Store details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateMyStore
      tags: [stores]
      summary: Update store profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStoreRequest"
      responses:
        "200":
          description: Store updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stores/me/users:
    get:
      operationId: getStoreUsers
      tags: [stores]
      summary: Get users of current store
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: addStoreUser
      tags: [stores]
      summary: Add a user to the store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stores/me/users/{userId}:
    delete:
      operationId: removeStoreUser
      tags: [stores]
      summary: Remove a user from the store
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/stores:
    get:
      operationId: adminGetAllStores
      tags: [admin]
      summary: Get all stores (superadmin)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [trial, active, expired, suspended]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of stores
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedStores"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stores/{storeId}:
    get:
      operationId: adminGetStore
      tags: [admin]
      summary: Get a specific store (superadmin)
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Store details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

    patch:
      operationId: adminUpdateStore
      tags: [admin]
      summary: Update store (superadmin)
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateStoreRequest"
      responses:
        "200":
          description: Store updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /admin/stores/{storeId}/license:
    patch:
      operationId: adminUpdateLicense
      tags: [admin]
      summary: Update store license (superadmin)
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLicenseRequest"
      responses:
        "200":
          description: License updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/License"

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Get platform statistics (superadmin)
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /categories:
    get:
      operationId: getCategories
      tags: [categories]
      summary: Get product categories for current store
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a new category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{categoryId}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "200":
          description: Category updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Category deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /products:
    get:
      operationId: getProducts
      tags: [products]
      summary: Get products for current store
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: categoryId
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: lowStock
          in: query
          schema:
            type: boolean
        - name: isActive
          in: query
          schema:
            type: boolean
        - name: isFeatured
          in: query
          schema:
            type: boolean
        - name: tags
          in: query
          schema:
            type: string
          description: Comma-separated list of tags to filter by
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [name, price, stock, createdAt]
            default: name
        - name: sortDir
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
      responses:
        "200":
          description: Paginated products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedProducts"

    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{productId}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a single product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /inventory/adjust:
    post:
      operationId: adjustInventory
      tags: [inventory]
      summary: Adjust inventory for a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdjustInventoryRequest"
      responses:
        "200":
          description: Inventory adjusted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryMovement"

  /inventory/movements:
    get:
      operationId: getInventoryMovements
      tags: [inventory]
      summary: Get inventory movement history with optional date and product filters
      parameters:
        - name: productId
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
        - name: type
          in: query
          schema:
            type: string
            enum: [in, out, adjustment]
      responses:
        "200":
          description: Inventory movements
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedInventoryMovements"

  /inventory/low-stock:
    get:
      operationId: getLowStockProducts
      tags: [inventory]
      summary: Get products with stock at or below minimum
      responses:
        "200":
          description: Low stock products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /inventory/kardex/{productId}:
    get:
      operationId: getProductKardex
      tags: [inventory]
      summary: Get kardex (stock card) for a specific product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Product kardex
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductKardex"

  /stats:
    get:
      operationId: getStoreStats
      tags: [stats]
      summary: Get store dashboard statistics
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month]
            default: month
      responses:
        "200":
          description: Store statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreStats"

  /products/export:
    get:
      operationId: exportProducts
      tags: [products]
      summary: Export all products as CSV data
      parameters:
        - name: categoryId
          in: query
          schema:
            type: string
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Products CSV data as JSON array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductExportRow"

  /products/import:
    post:
      operationId: importProducts
      tags: [products]
      summary: Import products from structured data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportProductsRequest"
      responses:
        "200":
          description: Import results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"

  /categories/reorder:
    patch:
      operationId: reorderCategories
      tags: [categories]
      summary: Reorder categories manually
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderRequest"
      responses:
        "200":
          description: Categories reordered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /stores/me/settings:
    get:
      operationId: getStoreSettings
      tags: [customization]
      summary: Get store customization settings
      responses:
        "200":
          description: Store settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreSettings"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateStoreSettings
      tags: [customization]
      summary: Update store customization settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStoreSettingsRequest"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreSettings"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stores/me/banners:
    get:
      operationId: getStoreBanners
      tags: [customization]
      summary: Get all promotional banners for the store
      responses:
        "200":
          description: List of banners
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StoreBanner"
    post:
      operationId: createStoreBanner
      tags: [customization]
      summary: Add a new promotional banner
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStoreBannerRequest"
      responses:
        "201":
          description: Banner created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreBanner"
        "400":
          description: Validation error or limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stores/me/banners/reorder:
    patch:
      operationId: reorderStoreBanners
      tags: [customization]
      summary: Reorder banners
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderRequest"
      responses:
        "200":
          description: Banners reordered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /stores/me/banners/{bannerId}:
    patch:
      operationId: updateStoreBanner
      tags: [customization]
      summary: Update a promotional banner
      parameters:
        - name: bannerId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateStoreBannerRequest"
      responses:
        "200":
          description: Banner updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreBanner"
    delete:
      operationId: deleteStoreBanner
      tags: [customization]
      summary: Delete a promotional banner
      parameters:
        - name: bannerId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Banner deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /products/{productId}/images:
    get:
      operationId: getProductImages
      tags: [product-images]
      summary: Get all images for a product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of product images
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductImage"
    post:
      operationId: addProductImage
      tags: [product-images]
      summary: Add image to a product (max 10)
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddProductImageRequest"
      responses:
        "201":
          description: Image added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductImage"
        "400":
          description: Limit reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /products/{productId}/images/reorder:
    patch:
      operationId: reorderProductImages
      tags: [product-images]
      summary: Reorder product images
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderRequest"
      responses:
        "200":
          description: Images reordered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /products/{productId}/images/{imageId}:
    patch:
      operationId: updateProductImage
      tags: [product-images]
      summary: Update a product image
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
        - name: imageId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductImageRequest"
      responses:
        "200":
          description: Image updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductImage"
    delete:
      operationId: deleteProductImage
      tags: [product-images]
      summary: Delete a product image
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
        - name: imageId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Image deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
        details:
          type: object
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    AuthResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        store:
          $ref: "#/components/schemas/Store"
        token:
          type: string
      required:
        - user
        - store
        - token

    CurrentUserResponse:
      type: object
      properties:
        user:
          $ref: "#/components/schemas/User"
        store:
          $ref: "#/components/schemas/Store"
        license:
          $ref: "#/components/schemas/License"
      required:
        - user
        - store

    RegisterStoreRequest:
      type: object
      properties:
        businessName:
          type: string
        businessType:
          type: string
          enum: [clothing, restaurant, bakery, fair_booth, general_catalog]
        documentType:
          type: string
          enum: [DNI, RUC10, RUC20]
        documentNumber:
          type: string
        ownerName:
          type: string
        phone:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        address:
          type: string
        district:
          type: string
        logoUrl:
          type: string
      required:
        - businessName
        - businessType
        - documentType
        - documentNumber
        - ownerName
        - phone
        - email
        - password
        - district

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
