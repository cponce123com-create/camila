openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Camila SaaS - API para emprendedores locales
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: stores
    description: Store/tenant management
  - name: admin
    description: Superadmin operations
  - name: users
    description: User management
  - name: products
    description: Product catalog
  - name: categories
    description: Product categories
  - name: inventory
    description: Inventory management
  - name: customization
    description: Store customization and branding
  - name: product-images
    description: Product image management

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: registerStore
      tags: [auth]
      summary: Register a new store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterStoreRequest"
      responses:
        "201":
          description: Store created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Store already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: loginUser
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logoutUser
      tags: [auth]
      summary: Logout user
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Get current user info
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUserResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request password reset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Reset email sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset password with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password reset
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Invalid token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stores/me:
    get:
      operationId: getMyStore
      tags: [stores]
      summary: Get current store details
      responses:
        "200":
          description: Store details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: updateMyStore
      tags: [stores]
      summary: Update store profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStoreRequest"
      responses:
        "200":
          description: Store updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stores/me/users:
    get:
      operationId: getStoreUsers
      tags: [stores]
      summary: Get users of current store
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"
    post:
      operationId: addStoreUser
      tags: [stores]
      summary: Add a user to the store
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddUserRequest"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stores/me/users/{userId}:
    delete:
      operationId: removeStoreUser
      tags: [stores]
      summary: Remove a user from the store
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: User removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /admin/stores:
    get:
      operationId: adminGetAllStores
      tags: [admin]
      summary: Get all stores (superadmin)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: status
          in: query
          schema:
            type: string
            enum: [trial, active, expired, suspended]
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paginated list of stores
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedStores"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /admin/stores/{storeId}:
    get:
      operationId: adminGetStore
      tags: [admin]
      summary: Get a specific store (superadmin)
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Store details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

    patch:
      operationId: adminUpdateStore
      tags: [admin]
      summary: Update store (superadmin)
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateStoreRequest"
      responses:
        "200":
          description: Store updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Store"

  /admin/stores/{storeId}/license:
    patch:
      operationId: adminUpdateLicense
      tags: [admin]
      summary: Update store license (superadmin)
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLicenseRequest"
      responses:
        "200":
          description: License updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/License"

  /admin/stats:
    get:
      operationId: adminGetStats
      tags: [admin]
      summary: Get platform statistics (superadmin)
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/stores/{storeId}/users:
    get:
      operationId: adminGetStoreUsers
      tags: [admin]
      summary: Get users for a specific store
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /admin/stores/{storeId}/users/{userId}:
    patch:
      operationId: adminUpdateStoreUser
      tags: [admin]
      summary: Update user (block/unblock, role, reset password)
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
        - name: userId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateUserRequest"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/stores/{storeId}/license-history:
    get:
      operationId: adminGetLicenseHistory
      tags: [admin]
      summary: Get license change history for a store
      parameters:
        - name: storeId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: License history
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LicenseHistory"

  /admin/audit-logs:
    get:
      operationId: adminGetAuditLogs
      tags: [admin]
      summary: Get audit logs
      parameters:
        - in: query
          name: targetType
          schema:
            type: string
        - in: query
          name: targetId
          schema:
            type: string
        - in: query
          name: actorId
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Audit logs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogListResponse"

  /admin/announcements:
    get:
      operationId: adminGetAnnouncements
      tags: [admin]
      summary: Get all announcements
      responses:
        "200":
          description: List of announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"
    post:
      operationId: adminCreateAnnouncement
      tags: [admin]
      summary: Create announcement
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnnouncementRequest"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"

  /admin/announcements/{announcementId}:
    patch:
      operationId: adminUpdateAnnouncement
      tags: [admin]
      summary: Update announcement
      parameters:
        - name: announcementId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAnnouncementRequest"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Announcement"
    delete:
      operationId: adminDeleteAnnouncement
      tags: [admin]
      summary: Delete announcement
      parameters:
        - name: announcementId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted

  /admin/support-tickets:
    get:
      operationId: adminGetSupportTickets
      tags: [admin]
      summary: Get all support tickets
      parameters:
        - in: query
          name: status
          schema:
            type: string
        - in: query
          name: priority
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: Tickets
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicketListResponse"

  /admin/support-tickets/{ticketId}:
    get:
      operationId: adminGetSupportTicket
      tags: [admin]
      summary: Get ticket detail
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicket"
    patch:
      operationId: adminUpdateSupportTicket
      tags: [admin]
      summary: Update ticket status / add response
      parameters:
        - name: ticketId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdminUpdateTicketRequest"
      responses:
        "200":
          description: Updated ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicket"

  /support-tickets:
    post:
      operationId: createSupportTicket
      tags: [admin]
      summary: Create support ticket (store user)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTicketRequest"
      responses:
        "201":
          description: Created ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicket"

  /active-announcements:
    get:
      operationId: getActiveAnnouncements
      tags: [admin]
      summary: Get active announcements for current store
      responses:
        "200":
          description: Active announcements
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Announcement"

  /categories:
    get:
      operationId: getCategories
      tags: [categories]
      summary: Get product categories for current store
      responses:
        "200":
          description: List of categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"
    post:
      operationId: createCategory
      tags: [categories]
      summary: Create a new category
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "201":
          description: Category created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"

  /categories/{categoryId}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Update a category
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCategoryRequest"
      responses:
        "200":
          description: Category updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Category"
    delete:
      operationId: deleteCategory
      tags: [categories]
      summary: Delete a category
      parameters:
        - name: categoryId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Category deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /products:
    get:
      operationId: getProducts
      tags: [products]
      summary: Get products for current store
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: categoryId
          in: query
          schema:
            type: string
        - name: search
          in: query
          schema:
            type: string
        - name: lowStock
          in: query
          schema:
            type: boolean
        - name: isActive
          in: query
          schema:
            type: boolean
        - name: isFeatured
          in: query
          schema:
            type: boolean
        - name: tags
          in: query
          schema:
            type: string
          description: Comma-separated list of tags to filter by
        - name: sortBy
          in: query
          schema:
            type: string
            enum: [name, price, stock, createdAt]
            default: name
        - name: sortDir
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: asc
        - name: talla
          in: query
          schema:
            type: string
          description: Filter by size (talla)
        - name: color
          in: query
          schema:
            type: string
          description: Filter by color name
        - name: estilo
          in: query
          schema:
            type: string
          description: Filter by style (estilo)
        - name: precioMin
          in: query
          schema:
            type: number
        - name: precioMax
          in: query
          schema:
            type: number
        - name: hasVariants
          in: query
          schema:
            type: boolean
          description: Only return products that have variants
      responses:
        "200":
          description: Paginated products
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedProducts"

    post:
      operationId: createProduct
      tags: [products]
      summary: Create a new product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "201":
          description: Product created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

  /products/{productId}:
    get:
      operationId: getProduct
      tags: [products]
      summary: Get a single product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

    patch:
      operationId: updateProduct
      tags: [products]
      summary: Update a product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "200":
          description: Product updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Product"

    delete:
      operationId: deleteProduct
      tags: [products]
      summary: Delete a product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Product deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /inventory/adjust:
    post:
      operationId: adjustInventory
      tags: [inventory]
      summary: Adjust inventory for a product
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AdjustInventoryRequest"
      responses:
        "200":
          description: Inventory adjusted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryMovement"

  /inventory/movements:
    get:
      operationId: getInventoryMovements
      tags: [inventory]
      summary: Get inventory movement history with optional date and product filters
      parameters:
        - name: productId
          in: query
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
        - name: type
          in: query
          schema:
            type: string
            enum: [in, out, adjustment]
      responses:
        "200":
          description: Inventory movements
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedInventoryMovements"

  /inventory/low-stock:
    get:
      operationId: getLowStockProducts
      tags: [inventory]
      summary: Get products with stock at or below minimum
      responses:
        "200":
          description: Low stock products
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Product"

  /inventory/kardex/{productId}:
    get:
      operationId: getProductKardex
      tags: [inventory]
      summary: Get kardex (stock card) for a specific product
      parameters:
        - name: productId
          in: path
          required: true
          schema:
            type: string
        - name: dateFrom
          in: query
          schema:
            type: string
            format: date
        - name: dateTo
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: Product kardex
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductKardex"

  /stats:
    get:
      operationId: getStoreStats
      tags: [stats]
      summary: Get store dashboard statistics
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month]
            default: month
      responses:
        "200":
          description: Store statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreStats"

  /products/export:
    get:
      operationId: exportProducts
      tags: [products]
      summary: Export all products as CSV data
      parameters:
        - name: categoryId
          in: query
          schema:
            type: string
        - name: isActive
          in: query
          schema:
            type: boolean
      responses:
        "200":
          description: Products CSV data as JSON array
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ProductExportRow"

  /products/import:
    post:
      operationId: importProducts
      tags: [products]
      summary: Import products from structured data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportProductsRequest"
      responses:
        "200":
          description: Import results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportResult"

  /categories/reorder:
    patch:
      operationId: reorderCategories
      tags: [categories]
      summary: Reorder categories manually
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReorderRequest"
      responses:
        "200":
          description: Categories reordered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /stores/me/settings:
    get:
      operationId: getStoreSettings
      tags: [customization]
      summary: Get store customization settings
      responses:
        "200":
          description: Store settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreSettings"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateStoreSettings
      tags: [customization]
      summary: Update store customization settings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateStoreSettingsRequest"
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StoreSettings"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /stores/me/banners:
    get:
      operationId: getStoreBanners
      tags: [customization]
      summary: Get all promotional banners for the store
      responses:
        "200":
          description: List of banners
          content:
            application/json:
